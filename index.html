        :root {

            --accent: #d4af37;
            --bg: #eceff1;
            --white: #ffffff;
            --card-shadow: 0 8px 30px rgba(0,0,0,0.12);
        }

        body {
            font-family: 'Pretendard', 'Malgun Gothic', sans-serif;
            margin: 0; padding: 0;
            line-height: 1.6;
            color: #2c3e50;
            overflow-x: hidden;
            background: #0f2027;
        }

        .bg-wrapper {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #1b5e20 0%, #002f00 100%);
            z-index: -1; overflow: hidden;
        }
        .bg-badge {
            position: absolute; opacity: 0.1;
            filter: grayscale(1) brightness(2);
            animation: drift 20s infinite linear;
        }
        @keyframes drift {
            from { transform: translateY(100vh) rotate(0deg); }
            to { transform: translateY(-20vh) rotate(360deg); }
        }

        #lang-bar {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(15px);
            padding: 12px 20px;
            text-align: right;
            display: flex;
            justify-content: flex-end; gap: 12px;
            position: sticky; top: 0; z-index: 100;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .lang-btn {
            background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2);
            padding: 6px 14px; border-radius: 20px; cursor: pointer; font-size: 0.85rem; transition: 0.3s;
        }
        .lang-btn.active { background: var(--accent); color: #000; font-weight: bold; border-color: var(--accent); }

        header {
            background: transparent; color: white; padding: 60px 20px;
            text-align: center; position: relative;
        }
        header h1 { font-size: 2.2rem; margin: 0; letter-spacing: -1px; text-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        header p { opacity: 0.9; font-size: 1.1rem; margin-top: 12px; }

        .container { max-width: 650px; margin: 0 auto; padding: 20px; position: relative; z-index: 10; }

        section { 
            background: rgba(255, 255, 255, 0.98); 
            padding: 30px; border-radius: 28px; 
            box-shadow: var(--card-shadow);
            border: 1px solid rgba(255,255,255,0.5);
            margin-bottom: 30px;
            position: relative;
        }
        
        .setup-preview-btn {
            position: absolute; top: 20px; right: 20px;
            background: #f1f5f9; color: #475569; border: 1px solid #e2e8f0;
            padding: 6px 12px; border-radius: 8px; font-size: 0.75rem;
            cursor: pointer; font-weight: 600; transition: 0.2s;
        }
        .setup-preview-btn:hover { background: #e2e8f0; }

        .form-group { margin-bottom: 25px; }
        label { display: block; font-weight: 600; margin-bottom: 12px; color: #34495e; font-size: 0.95rem; }
        input, textarea, select { 
            width: 100%; padding: 16px; border: 1.5px solid #e2e8f0; border-radius: 16px; 
            box-sizing: border-box; font-size: 1rem; transition: 0.3s; background: #f8fafc;
        }
        
        .btn-main { 
            width: 100%; padding: 22px; background: var(--primary); color: white; border: none; 
            border-radius: 18px; font-size: 1.25rem; font-weight: 700; cursor: pointer; 
            margin-top: 15px; transition: 0.3s; box-shadow: 0 6px 20px rgba(0,0,0,0.15);
        }
        
        #edu-section { display: none; }
        .edu-card { 
            background: white; border-radius: 20px; padding: 25px; margin-bottom: 25px; 
            border: 1px solid #edf2f7; position: relative; border-left: 10px solid #cbd5e0; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
        .edu-card.done { border-left-color: var(--primary); background: #f0fdf4 !important; border-color: #bbf7d0; transform: translateY(-5px); }
        
        .edu-date { font-size: 0.85rem; color: #718096; margin-bottom: 8px; font-weight: 600; }
        .edu-btn { 
            display: block; margin-top: 18px; padding: 16px; background: #2d3748; color: white; 
            text-align: center; text-decoration: none; border-radius: 14px; font-weight: 600; 
            border: none; width: 100%; cursor: pointer; transition: 0.3s;
        }
        .done .edu-btn { background: var(--primary); }

        .quiz-container { margin-top: 15px; text-align: left; }
        .quiz-option { 
            display: block; width: 100%; padding: 12px; margin-bottom: 8px; 
            border: 1px solid #e2e8f0; border-radius: 10px; background: white;
            cursor: pointer; transition: 0.2s; font-size: 0.9rem; text-align: left;
        }
        .quiz-option:hover { background: #f1f5f9; border-color: #cbd5e0; }
        .quiz-option.correct { background: #dcfce7 !important; border-color: #22c55e !important; }
        .quiz-option.wrong { background: #fee2e2 !important; border-color: #ef4444 !important; }

        #cert-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; padding: 10px;
            backdrop-filter: blur(10px);
        }
        #cert-content {
            background: white; width: 95%; max-width: 500px; padding: 30px 20px; border: 8px double var(--accent);
            text-align: center; position: relative; box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            animation: modalUp 0.7s cubic-bezier(0.23, 1, 0.32, 1);
            background-image: radial-gradient(circle at 2px 2px, #f7f7f7 1px, transparent 0);
            background-size: 30px 30px;
            max-height: 90vh; overflow-y: auto;
        }
        @keyframes modalUp { from { transform: translateY(80px) scale(0.9); opacity: 0; } to { transform: translateY(0) scale(1); opacity: 1; } }
        
        .cert-title { font-size: 2.2rem; color: #b8860b; font-weight: 800; margin-bottom: 20px; letter-spacing: 4px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .cert-name { font-size: 1.4rem; font-weight: 700; margin-bottom: 25px; border-bottom: 2px solid #b8860b; display: inline-block; padding: 0 20px; color: #1a202c; }
        .cert-body { font-size: 1rem; line-height: 1.8; margin-bottom: 30px; word-break: keep-all; color: #4a5568; }
        .cert-msg { background: #fffaf0; padding: 15px; border-radius: 12px; border: 1px solid #feebc8; margin-bottom: 30px; font-style: italic; color: #744210; font-weight: 500; font-size: 0.95rem; }
        .cert-footer { font-size: 1.2rem; font-weight: 800; color: #2d3748; }
        .cert-date { font-size: 0.9rem; color: #a0aec0; margin-top: 15px; }

        .cert-buttons { display: flex; justify-content: center; gap: 10px; margin-top: 25px; }
        .btn-close, .btn-save { padding: 12px 20px; border: none; border-radius: 10px; cursor: pointer; font-weight: 600; transition: 0.3s; flex: 1; font-size: 0.9rem; }
        .btn-close { background: #e2e8f0; color: #4a5568; }
        .btn-save { background: var(--primary); color: white; }

            background: #f1f5f9; color: #475569; border: 1px solid #e2e8f0; padding: 10px 16px; border-radius: 10px;

            font-weight: 600;
        }

</head>

        <div class="form-group">

            <input type="text" id="p_name" placeholder="성함을 입력하세요">
        </div>
        <div class="form-group">
            <label id="txt-label-msg">사랑의 메시지</label>
            <textarea id="p_msg" placeholder="사기 당하지 말고 행복하게 살자!"></textarea>
        </div>
        <button class="btn-main" id="txt-btn-generate" onclick="generateLink()">교육 링크 생성</button>

        <div id="link-display" style="display:none;">
            <p id="txt-link-ready" style="font-weight:bold; color:var(--primary); margin-bottom: 5px;">링크가 준비되었습니다!</p>
            <p id="txt-link-instruct" style="font-size: 0.85rem; color: #666; margin-bottom: 15px;">교육링크 클릭 후 생성된 코드를 문자/이메일을 통해 전달하세요</p>
            <button class="btn-main" style="background:#fee500; color:#3c1e1e;" id="txt-btn-copy" onclick="copyUrl()">링크 복사 후 카톡 전송</button>
            <p id="final-url" style="font-size:0.75rem; color:#888; word-break:break-all; margin-top:10px;"></p>
        </div>
    </section>

    <section id="edu-section">
        <div style="text-align: center; margin-bottom: 35px;">
            <h2 id="txt-edu-welcome" style="color: var(--primary); font-size: 1.4rem; margin-bottom: 12px;"></h2>
            <p id="txt-edu-desc" style="color: #4a5568; font-size: 1rem; word-break: keep-all;"></p>
            <div style="background:#e2e8f0; height:12px; border-radius:10px; overflow:hidden; margin:25px 0;">
                <div id="progress-fill" style="width:0%; height:100%; background:var(--primary); transition:0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);"></div>
            </div>
            <p id="txt-progress" style="font-weight: 800; color: var(--primary);"></p>
        </div>
        <div id="edu-list"></div>
        <div id="completion-buttons" style="display:none; flex-direction: column; gap: 10px;">
            <button id="preview-btn" class="btn-main" style="background:var(--accent); color: #4e342e; margin-top: 0;" onclick="showFancyCert()">👀 수료증 미리보기</button>
            <button id="issue-btn" class="btn-main" style="background:var(--accent); color: #4e342e; margin-top: 0;" onclick="showFancyCert()">🏆 교육 이수 상장 확인</button>
        </div>
    </section>
</div>

<div id="cert-modal">
    <div id="cert-content">
        <div class="cert-title" id="cert-ui-title">수 료 증</div>
        <div class="cert-name"><span id="cert-ui-name"></span> <span id="cert-ui-suffix"></span></div>
        <div class="cert-body" id="cert-ui-body"></div>
        <div class="cert-msg">" <span id="cert-ui-msg"></span> "</div>
        <div class="cert-footer" id="cert-ui-footer">우리집 안전 보안관 본부</div>
        <div class="cert-date" id="cert-ui-date"></div>
        <div class="cert-buttons">
            <button class="btn-save" id="btn-save-ui" onclick="saveCertAsImage()">저장하기</button>
            <button class="btn-close" id="btn-close-ui" onclick="closeCert()">닫기</button>
        </div>
    </div>
</div>

        ja: [
            { id: 1, title: "[分析] 2026년 日本の詐欺トレンド", content: "2026年の日本では, SNSを通じた投資勧誘とロマンス詐欺가高度에 융합된 수법이 급증하고 있습니다. 범인은 긴 시간을 들여 신뢰 관계를 쌓고, 교묘한 가짜 투자 플랫폼으로 유도합니다. AI를 이용한 '사칭' 전화에도 주의가 필요합니다.", date: "2026.01.01" },
            { id: 2, title: "[クイズ] SNS投資詐欺クイズ", quiz: { question: "SNSで知り合った外国人から『特別な投資情報』を教えると言われたら?", options: ["運命だと信じて振り込む。", "詐欺の可能性が高いので相談・ブロックする。"], answer: 1 }, date: "2024.03.12" },
            { id: 3, title: "[YouTube] あなた에会いに日本に行きます (投資詐欺)", url: "https://www.youtube.com/results?search_query=ロマンス詐欺+2400万円+被害", date: "2024.02.20" }
        ]
    };

    let currentLang = 'ko';

    function initBackground() {
        const bg = document.getElementById('bg-badges');
        const badgeSvg = `<svg viewBox="0 0 24 24" width="80" height="80" fill="currentColor"><path d="M12 1L9 9H1L7 14L4 22L12 17L20 22L17 14L23 9H15L12 1Z"/></svg>`;
        for(let i=0; i<12; i++) {
            const div = document.createElement('div');
            div.className = 'bg-badge';
            div.innerHTML = badgeSvg;
            div.style.left = Math.random() * 100 + 'vw';
            div.style.top = Math.random() * 100 + 'vh';
            div.style.animationDelay = (Math.random() * 10) + 's';
            bg.appendChild(div);
        }
    }

    function changeLang(lang) {
        currentLang = lang;
        document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
        const activeBtn = document.getElementById(`btn-${lang}`);
        if(activeBtn) activeBtn.classList.add('active');

        const d = langData[lang];
        document.getElementById('txt-title').innerText = d.title;
        document.getElementById('txt-subtitle').innerText = d.subtitle;
        document.getElementById('txt-setup-h2').innerText = d.setupH2;
        document.getElementById('btn-setup-preview').innerText = d.setupPreview;
        document.getElementById('txt-label-target').innerText = d.labelTarget;
        document.getElementById('txt-opt-parent').innerText = d.optParent;
        document.getElementById('txt-opt-child').innerText = d.optChild;
        document.getElementById('txt-opt-spouse').innerText = d.optSpouse;
        document.getElementById('txt-label-name').innerText = d.labelName;
        document.getElementById('p_name').placeholder = d.placeholderName;
        document.getElementById('txt-label-msg').innerText = d.labelMsg;
        document.getElementById('p_msg').placeholder = d.placeholderMsg;
        document.getElementById('txt-btn-generate').innerText = d.btnGenerate;
        document.getElementById('txt-link-ready').innerText = d.linkReady;
        document.getElementById('txt-link-instruct').innerText = d.linkInstruct;
        document.getElementById('txt-btn-copy').innerText = d.btnCopy;
        document.getElementById('txt-edu-desc').innerText = d.eduDesc;
        document.getElementById('preview-btn').innerText = d.previewBtn;
        document.getElementById('issue-btn').innerText = d.issueBtn;
        document.getElementById('btn-save-ui').innerText = d.btnSave;
        document.getElementById('btn-close-ui').innerText = d.btnClose;

        const name = new URLSearchParams(window.location.search).get('name') || "";
        document.getElementById('txt-edu-welcome').innerText = (name ? name : "") + d.eduWelcome;

        if(document.getElementById('edu-section').style.display === 'block') renderList();
    }

    function previewOnSetup() {
        const name = document.getElementById('p_name').value;
        const msg = document.getElementById('p_msg').value;
        if(!name || !msg) return alert(currentLang === 'ko' ? "이름과 메시지를 먼저 입력해주세요." : "Please enter name and message first.");
        
        const d = langData[currentLang];
        document.getElementById('cert-ui-title').innerText = d.certTitle;
        document.getElementById('cert-ui-name').innerText = name;
        document.getElementById('cert-ui-suffix').innerText = d.certSuffix;
        document.getElementById('cert-ui-body').innerText = d.certBody;
        document.getElementById('cert-ui-msg').innerText = msg;
        document.getElementById('cert-ui-footer').innerText = d.certFooter;
        document.getElementById('cert-ui-date').innerText = new Date().toLocaleDateString();
        document.getElementById('cert-modal').style.display = 'flex';
    }

    function generateLink() {
        const target = document.getElementById('target_type').value;
        const name = document.getElementById('p_name').value;
        const msg = document.getElementById('p_msg').value;
        if(!name || !msg) return alert(currentLang === 'ko' ? "내용을 모두 입력해주세요." : "Fields are required.");
        const url = `${window.location.href.split('?')[0]}?lang=${currentLang}&target=${target}&name=${encodeURIComponent(name)}&msg=${encodeURIComponent(msg)}`;
        document.getElementById('final-url').innerText = url;
        document.getElementById('link-display').style.display = 'block';
    }

    function copyUrl() {
        navigator.clipboard.writeText(document.getElementById('final-url').innerText);
        alert(langData[currentLang].alertLink);
    }

    function renderList() {
        const list = document.getElementById('edu-list');
        list.innerHTML = '';
        const d = langData[currentLang];
        const eduList = eduDataPerLang[currentLang];
        eduList.forEach((item) => {
            const isDone = localStorage.getItem(`done_${item.id}`);
            const div = document.createElement('div');
            div.className = `edu-card ${isDone ? 'done' : ''}`;
            
            if (item.content) { 
                div.innerHTML = `
                    <div class="edu-date">${item.date}</div>
                    <span style="font-weight:bold; display:block; margin-bottom:10px;">${item.title}</span>
                    <button class="btn-tts" onclick="speakText('${item.content.replace(/'/g, "\\'")}')">${d.readAloud}</button>
                    <p style="font-size:0.95rem; color:#444; background:#f8fafc; padding:15px; border-radius:12px; border:1px solid #e2e8f0; margin-bottom:10px;">${item.content}</p>
                    <button class="edu-btn" onclick="done(${item.id})">${isDone ? d.trendConfirm : d.eduBtn}</button>`;
            } else if (item.quiz) { 
                let optionsHtml = '';
                item.quiz.options.forEach((opt, idx) => {
                    optionsHtml += `<button class="quiz-option ${isDone && idx === item.quiz.answer ? 'correct' : ''}" onclick="checkQuiz(this, ${idx}, ${item.quiz.answer}, ${item.id})">${opt}</button>`;
                });
                div.innerHTML = `
                    <div class="edu-date">${item.date}</div>
                    <span style="font-weight:bold; display:block; margin-bottom:10px;">${item.title}</span>
                    <div class="quiz-container">
                        <p style="font-weight:600; font-size:0.95rem; margin-bottom:15px;">Q. ${item.quiz.question}</p>
                        ${optionsHtml}
                    </div>`;
            } else { 
                div.innerHTML = `
                    <div class="edu-date">${item.date}</div>
                    <span style="font-weight:bold;">${item.title}</span>
                    <a href="${item.url}" target="_blank" class="edu-btn" onclick="done(${item.id})">${d.eduBtn}</a>`;
            }
            list.appendChild(div);
        });
        updateStatus();
    }

    function checkQuiz(btn, selected, correct, id) {
        if(localStorage.getItem(`done_${id}`)) return;
        if(selected === correct) {
            btn.classList.add('correct');
            alert(langData[currentLang].quizCorrect);
            done(id);
        } else {
            btn.classList.add('wrong');
            alert(langData[currentLang].quizWrong);
            setTimeout(() => btn.classList.remove('wrong'), 500);
        }
    }

    function speakText(text) {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = langData[currentLang].ttsLang;
        utterance.pitch = 1.1; utterance.rate = 0.95;
        window.speechSynthesis.speak(utterance);
    }

    function done(id) {
        localStorage.setItem(`done_${id}`, 'true');
        setTimeout(renderList, 800);
    }

    function updateStatus() {
        let count = 0;
        const eduList = eduDataPerLang[currentLang];
        eduList.forEach(i => { if(localStorage.getItem(`done_${i.id}`)) count++; });
        const total = eduList.length;
        document.getElementById('progress-fill').style.width = (count/total*100) + '%';
        document.getElementById('txt-progress').innerText = `${langData[currentLang].progress}: ${count} / ${total}`;
        if(count >= total) document.getElementById('completion-buttons').style.display = 'flex';
    }

    function showFancyCert() {
        const params = new URLSearchParams(window.location.search);
        const d = langData[currentLang];
        document.getElementById('cert-ui-title').innerText = d.certTitle;
        document.getElementById('cert-ui-name').innerText = params.get('name') || "";
        document.getElementById('cert-ui-suffix').innerText = d.certSuffix;
        document.getElementById('cert-ui-body').innerText = d.certBody;
        document.getElementById('cert-ui-msg').innerText = params.get('msg') || "";
        document.getElementById('cert-ui-footer').innerText = d.certFooter;
        document.getElementById('cert-ui-date').innerText = new Date().toLocaleDateString();
        document.getElementById('cert-modal').style.display = 'flex';
    }

    async function saveCertAsImage() {
        const content = document.getElementById('cert-content');
        const buttons = document.querySelector('.cert-buttons');
        buttons.style.visibility = 'hidden'; 
        try {
            const canvas = await html2canvas(content, { scale: 3, backgroundColor: "#ffffff", useCORS: true });
            canvas.toBlob((blob) => {
                const url = window.URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url; link.download = `Award.png`;
                link.click();
                window.URL.revokeObjectURL(url);
            }, 'image/png');
        } catch (e) { alert("Error"); } finally { buttons.style.visibility = 'visible'; }
    }

    function closeCert() { document.getElementById('cert-modal').style.display = 'none'; }

    window.onload = () => {
        initBackground();
        const params = new URLSearchParams(window.location.search);
        if(params.get('name')) {
            if (!sessionStorage.getItem('session_active')) {
                [1,2,3].forEach(id => localStorage.removeItem(`done_${id}`));
                sessionStorage.setItem('session_active', 'true');
            }
            changeLang(params.get('lang') || 'ko');
            document.getElementById('setup-section').style.display = 'none';
            document.getElementById('edu-section').style.display = 'block';
            renderList();
        }
    };
</script>
</body>
</html>
