<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리집 안전 보안관 - 다국어 지원 시스템</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root {
            --primary: #2e7d32;
            --accent: #b59410;
            --bg: #f4f7f4;
            --white: #ffffff;
        }

        body {
            font-family: 'Pretendard', 'Malgun Gothic', sans-serif;
            background-color: var(--bg);
            margin: 0; padding: 0;
            line-height: 1.6;
        }

        #lang-bar {
            background: #1b5e20;
            padding: 10px;
            text-align: right;
            display: flex;
            justify-content: flex-end; gap: 10px;
        }
        .lang-btn {
            background: rgba(255,255,255,0.2); color: white; border: 1px solid white;
            padding: 5px 12px; border-radius: 5px; cursor: pointer; font-size: 0.85rem;
        }
        .lang-btn.active { background: white; color: var(--primary); font-weight: bold; }

        header {
            background-color: var(--primary); color: white; padding: 30px 20px;
            text-align: center; border-bottom-left-radius: 30px; border-bottom-right-radius: 30px;
        }

        .container { max-width: 600px; margin: 0 auto; padding: 20px; }

        section { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 10px; }
        input, textarea, select { width: 100%; padding: 15px; border: 2px solid #ddd; border-radius: 12px; box-sizing: border-box; }
        .btn-main { width: 100%; padding: 20px; background: var(--primary); color: white; border: none; border-radius: 15px; font-size: 1.2rem; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        #edu-section { display: none; }
        .edu-card { border-radius: 15px; padding: 20px; margin-bottom: 15px; border: 1px solid #eee; position: relative; border-left: 8px solid #ccc; transition: 0.3s; }
        .edu-card.done { border-left-color: var(--primary); background: #e8f5e9 !important; border-color: #c8e6c9; }
        
        .edu-date { font-size: 0.8rem; color: #888; margin-bottom: 5px; }
        .edu-btn { display: block; margin-top: 10px; padding: 12px; background: #444; color: white; text-align: center; text-decoration: none; border-radius: 8px; font-weight: bold; border: none; width: 100%; cursor: pointer; }
        .done .edu-btn { background: var(--primary); }

        #link-display { display: none; margin-top: 20px; padding: 15px; background: #e8f5e9; border: 2px dashed var(--primary); border-radius: 12px; text-align: center; }

        /* [상장 모달 스타일] */
        #cert-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center; padding: 20px;
        }
        #cert-content {
            background: white; width: 100%; max-width: 500px; padding: 40px; border: 15px double var(--accent);
            text-align: center; position: relative; box-shadow: 0 0 30px rgba(0,0,0,0.5);
            animation: modalUp 0.5s ease-out;
        }
        @keyframes modalUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .cert-title { font-size: 2.5rem; color: var(--accent); font-weight: bold; margin-bottom: 20px; text-decoration: underline; }
        .cert-name { font-size: 1.5rem; font-weight: bold; margin-bottom: 25px; border-bottom: 1px solid #eee; display: inline-block; padding: 0 20px; }
        .cert-body { font-size: 1.1rem; line-height: 1.8; margin-bottom: 30px; word-break: keep-all; color: #333; }
        .cert-msg { background: #fffde7; padding: 15px; border-radius: 10px; border: 1px dashed #d4af37; margin-bottom: 30px; font-style: italic; color: #555; }
        .cert-footer { font-size: 1.2rem; font-weight: bold; color: #222; }
        .cert-date { font-size: 0.9rem; color: #999; margin-top: 10px; }
        .btn-close { margin-top: 20px; padding: 10px 25px; background: #555; color: white; border: none; border-radius: 5px; cursor: pointer; }

        /* [읽어주기 버튼 스타일] */
        .btn-tts {
            background: #e0e0e0; color: #333; border: none; padding: 5px 10px; border-radius: 5px;
            font-size: 0.8rem; cursor: pointer; margin-bottom: 10px; display: flex; align-items: center; gap: 5px;
        }
        .btn-tts:hover { background: #d0d0d0; }
    </style>
</head>
<body>

<div id="lang-bar">
    <button id="btn-ko" class="lang-btn active" onclick="changeLang('ko')">한국어</button>
    <button id="btn-en" class="lang-btn" onclick="changeLang('en')">English</button>
    <button id="btn-ja" class="lang-btn" onclick="changeLang('ja')">日本語</button>
</div>

<header>
    <h1 id="txt-title">🛡️ 우리집 안전 보안관</h1>
    <p id="txt-subtitle">사랑하는 가족을 위한 맞춤 교육</p>
</header>

<div class="container">
    <section id="setup-section">
        <h2 id="txt-setup-h2">1. 교육 대상 설정</h2>
        <div class="form-group">
            <label id="txt-label-target">누구에게 보낼까요?</label>
            <select id="target_type">
                <option value="parent" id="txt-opt-parent">부모님께 (효도 보안관)</option>
                <option value="child" id="txt-opt-child">자녀에게 (청년 보안관)</option>
                <option value="spouse" id="txt-opt-spouse">배우자에게 (파트너 보안관)</option>
            </select>
        </div>
        <div class="form-group">
            <label id="txt-label-name">받는 분 성함</label>
            <input type="text" id="p_name" placeholder="성함을 입력하세요">
        </div>
        <div class="form-group">
            <label id="txt-label-msg">사랑의 메시지</label>
            <textarea id="p_msg" placeholder="사기 당하지 말고 행복하게 살자!"></textarea>
        </div>
        <button class="btn-main" id="txt-btn-generate" onclick="generateLink()">교육 링크 생성</button>

        <div id="link-display">
            <p id="txt-link-ready" style="font-weight:bold; color:var(--primary);">링크가 준비되었습니다!</p>
            <button class="btn-main" style="background:#fee500; color:#3c1e1e;" id="txt-btn-copy" onclick="copyUrl()">링크 복사 후 카톡 전송</button>
            <p id="final-url" style="font-size:0.75rem; color:#888; word-break:break-all; margin-top:10px;"></p>
        </div>
    </section>

    <section id="edu-section">
        <div style="text-align: center; margin-bottom: 20px;">
            <h2 id="txt-edu-welcome">보안관님 환영합니다!</h2>
            <p id="txt-edu-desc">가족이 준비한 교육을 완료해 주세요.</p>
            <div style="background:#eee; height:15px; border-radius:10px; overflow:hidden; margin:15px 0;">
                <div id="progress-fill" style="width:0%; height:100%; background:var(--primary); transition:0.3s;"></div>
            </div>
            <p id="txt-progress">진행도: 0 / 3</p>
        </div>
        <div id="edu-list"></div>
        <button id="issue-btn" class="btn-main" style="display:none; background:var(--accent);" onclick="showFancyCert()">🏆 교육 이수 상장 확인</button>
    </section>
</div>

<!-- 팬시 상장 모달 -->
<div id="cert-modal">
    <div id="cert-content">
        <div class="cert-title" id="cert-ui-title">수 료 증</div>
        <div class="cert-name"><span id="cert-ui-name"></span> <span id="cert-ui-suffix"></span></div>
        <div class="cert-body" id="cert-ui-body"></div>
        <div class="cert-msg">" <span id="cert-ui-msg"></span> "</div>
        <div class="cert-footer" id="cert-ui-footer">우리집 안전 보안관 본부</div>
        <div class="cert-date" id="cert-ui-date">2026. 03. 29</div>
        <button class="btn-close" onclick="closeCert()">닫기</button>
    </div>
</div>

<script>
    const langData = {
        ko: {

            certFooter: "우리집 안전 보안관 본부",
            certSuffix: "안전보안관님",
            eduBtn: "내용 확인하기", alertLink: "링크가 복사되었습니다!",
            issueBtn: "🏆 교육 이수 상장 확인",
            trendConfirm: "분석 내용 확인 완료",
            readAloud: "🔊 분석 내용 읽어주기",
            ttsLang: "ko-KR",
            eduList: [
                { id: 1, title: "[분석] 2026년 대한민국 사기 트렌드 요약", content: "2026년 한국의 사기 트렌드는 '초정밀 하이브리드화'입니다. AI 딥페이크로 목소리와 얼굴을 똑같이 흉내 낸 가족 사칭 사기가 주를 이룹니다. 특히 '로맨스 스캠'과 '투자 사기'가 결합되어 피해자의 심리와 자산을 동시에 공략하는 정교한 수법이 기승을 부리고 있습니다. 모르는 링크나 과도한 수익 약속은 무조건 의심하십시오.", date: "2026.01.01" },
                { id: 2, title: "[유튜브] 2026년형 보이스피싱 신종 수법과 돈 돌려받는 법", url: "https://www.youtube.com/results?search_query=2026년+보이스피싱+신종수법", date: "2026.01.10" },
                { id: 3, title: "[유튜브] [속보] 법무부, '120억 로맨스 스캠 부부' 송환 요청", url: "https://www.youtube.com/results?search_query=120억+로맨스+스캠+부부+송환", date: "2024.03.15" }
            ]
        },
        en: {
            title: "🛡️ Family Safety Sheriff", subtitle: "Customized Education for Your Loved Ones",
            setupH2: "1. Setup Education Target", labelTarget: "Who is this for?", optParent: "For Parents", optChild: "For Children", optSpouse: "For Spouse",
            labelName: "Recipient Name", labelMsg: "Message of Love", btnGenerate: "Create Education Link",
            placeholderName: "Enter name", placeholderMsg: "Stay safe and be happy!",
            linkReady: "Link is Ready!", btnCopy: "Copy Link & Send",

            eduDesc: "AI Voice Cloning and Deepfake FaceTime scams are major threats in 2026. Please complete these missions.", 
            progress: "Progress",
            certTitle: "CERTIFICATE", 
            certBody: "This certificate is awarded to the above safety sheriff for successfully completing the family safety education prepared with love by your family.",
            certFooter: "Family Safety Sheriff HQ",
            certSuffix: "Safety Sheriff",
            eduBtn: "View Content", alertLink: "Link copied to clipboard!",
            issueBtn: "🏆 View Completion Certificate",
            trendConfirm: "Confirmed",
            readAloud: "🔊 Read Aloud",
            ttsLang: "en-US",
            eduList: [
                { id: 1, title: "[Analysis] 2026 Global Fraud Trends", content: "The 2026 fraud landscape is dominated by AI-driven technologies. 'Voice Cloning' allows scammers to replicate voices with seconds of audio, while 'Deepfake FaceTime' makes impersonation incredibly convincing. Celebrity-impersonated Love Scams and fake investment portals are also at an all-time high. Never share codes or personal data.", date: "2026.01.01" },
                { id: 2, title: "[YouTube] THESE 5 Scams Are EXPLODING in 2026", url: "https://www.youtube.com/results?search_query=Rossen+Reports+Scams+2026", date: "2026.01.05" },
                { id: 3, title: "[YouTube] The Call That Sounds Like Your Kid (But Isn't)", url: "https://www.youtube.com/results?search_query=AI+voice+cloning+scam+protection", date: "2025.11.20" }
            ]
        },
        ja: {
            title: "🛡️ 我が家の安全保安官", subtitle: "大切な家族のための防犯 education",
            setupH2: "1. 教育대상 設定", labelTarget: "誰に送りますか？", optParent: "ご両親へ", optChild: "お子様へ", optSpouse: "配偶者へ",
            labelName: "お名前", labelMsg: "愛のメッセージ", btnGenerate: "教育링크を作成",
            placeholderName: "名前を入力してください", placeholderMsg: "詐欺에遭わず、幸せ에暮らそう！",
            linkReady: "링크가 준비되었습니다!", btnCopy: "コピーして送信",
            eduWelcome: "ようこそ、保安官様！", 
            eduDesc: "SNS型投資・ロマンス詐欺が急増しています。資産を守るため、以下の教育を完了してください。", 
            progress: "進捗",
            certTitle: "修 了 証", 
            certBody: "上記の安全保安官は、家族が丹精込めて準備した防犯教育課程を誠実に修了したため、本証を授与します。",
            certFooter: "我が家の安全保安官本部",
            certSuffix: "安全保安官様",
            eduBtn: "内容を見る", alertLink: "リンクをコピーしました！",
            issueBtn: "🏆 修了証（上状）を確認",
            trendConfirm: "確認済み",
            readAloud: "🔊 内容を読み上げる",
            ttsLang: "ja-JP",
            eduList: [
                { id: 1, title: "[分析] 2026年 日本の詐欺トレンド", content: "2026年の日本では, SNSを通じた投資勧誘とロマンス詐欺が高度に融合한手法가急増しています. 犯人は長い時間をかけて信頼関係を築き, 巧妙な偽의投資プラットフォームへの誘導も確認されています. AIを用いた『なりすまし』電話にも注意が必要です.", date: "2026.01.01" },
                { id: 2, title: "[ニュース] SNS詐欺対策、SIM本人確認義務づけ", url: "https://www.nikkei.com/article/DGXZQOUA123450S4A310C2000000/", date: "2024.03.12" },
                { id: 3, title: "[YouTube] あなた에会いに日本に行きます (投資詐欺)", url: "https://www.youtube.com/results?search_query=ロマンス詐欺+2400万円+被害", date: "2024.02.20" }
            ]
        }
    };

    let currentLang = 'ko';

    function changeLang(lang) {
        currentLang = lang;
        document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
        const activeBtn = document.getElementById(`btn-${lang}`);
        if(activeBtn) activeBtn.classList.add('active');

        const d = langData[lang];
        document.getElementById('txt-title').innerText = d.title;
        document.getElementById('txt-subtitle').innerText = d.subtitle;
        document.getElementById('txt-setup-h2').innerText = d.setupH2;
        document.getElementById('txt-label-target').innerText = d.labelTarget;
        document.getElementById('txt-opt-parent').innerText = d.optParent;
        document.getElementById('txt-opt-child').innerText = d.optChild;
        document.getElementById('txt-opt-spouse').innerText = d.optSpouse;
        document.getElementById('txt-label-name').innerText = d.labelName;
        document.getElementById('p_name').placeholder = d.placeholderName;
        document.getElementById('txt-label-msg').innerText = d.labelMsg;
        document.getElementById('p_msg').placeholder = d.placeholderMsg;
        document.getElementById('txt-btn-generate').innerText = d.btnGenerate;
        document.getElementById('txt-link-ready').innerText = d.linkReady;
        document.getElementById('txt-btn-copy').innerText = d.btnCopy;
        document.getElementById('txt-edu-welcome').innerText = d.eduWelcome;
        document.getElementById('txt-edu-desc').innerText = d.eduDesc;
        document.getElementById('issue-btn').innerText = d.issueBtn;

        if(document.getElementById('edu-section').style.display === 'block') renderList();
    }

    function generateLink() {
        const target = document.getElementById('target_type').value;
        const name = document.getElementById('p_name').value;
        const msg = document.getElementById('p_msg').value;
        if(!name || !msg) return alert(currentLang === 'ko' ? "내용을 모두 입력해주세요." : "Fields are required.");
        const url = `${window.location.href.split('?')[0]}?lang=${currentLang}&target=${target}&name=${encodeURIComponent(name)}&msg=${encodeURIComponent(msg)}`;
        document.getElementById('final-url').innerText = url;
        document.getElementById('link-display').style.display = 'block';
    }

    function copyUrl() {
        navigator.clipboard.writeText(document.getElementById('final-url').innerText);
        alert(langData[currentLang].alertLink);
    }

    function renderList() {
        const list = document.getElementById('edu-list');
        list.innerHTML = '';
        const d = langData[currentLang];
        d.eduList.forEach((item) => {
            const isDone = localStorage.getItem(`done_${item.id}`);
            const div = document.createElement('div');
            div.className = `edu-card ${isDone ? 'done' : ''}`;
            if (item.content) { 
                div.innerHTML = `
                    <div class="edu-date">${item.date}</div>
                    <span style="font-weight:bold; display:block; margin-bottom:10px;">${item.title}</span>
                    <button class="btn-tts" onclick="speakText('${item.content.replace(/'/g, "\\'")}')">${d.readAloud}</button>
                    <p style="font-size:0.9rem; color:#444; background:#f9f9f9; padding:12px; border-radius:8px; border:1px solid #eee; margin-bottom:10px;">${item.content}</p>
                    <button class="edu-btn" onclick="done(${item.id})">${isDone ? d.trendConfirm : d.eduBtn}</button>`;
            } else { 
                div.innerHTML = `
                    <div class="edu-date">${item.date}</div>
                    <span style="font-weight:bold;">${item.title}</span>
                    <a href="${item.url}" target="_blank" class="edu-btn" onclick="done(${item.id})">${d.eduBtn}</a>`;
            }
            list.appendChild(div);
        });
        updateStatus();
    }

    function speakText(text) {
        window.speechSynthesis.cancel(); // 기존 재생 중단
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = langData[currentLang].ttsLang;
        window.speechSynthesis.speak(utterance);
    }

    function done(id) {
        localStorage.setItem(`done_${id}`, 'true');
        setTimeout(renderList, 1000);
    }

    function updateStatus() {
        let count = 0;
        const d = langData[currentLang];
        d.eduList.forEach(i => { if(localStorage.getItem(`done_${i.id}`)) count++; });
        const total = d.eduList.length;
        document.getElementById('progress-fill').style.width = (count/total*100) + '%';
        document.getElementById('txt-progress').innerText = `${d.progress}: ${count} / ${total}`;
        if(count >= total) document.getElementById('issue-btn').style.display = 'block';
    }

    function showFancyCert() {
        const params = new URLSearchParams(window.location.search);
        const d = langData[currentLang];
        document.getElementById('cert-ui-title').innerText = d.certTitle;
        document.getElementById('cert-ui-name').innerText = params.get('name') || "";
        document.getElementById('cert-ui-suffix').innerText = d.certSuffix;
        document.getElementById('cert-ui-body').innerText = d.certBody;
        document.getElementById('cert-ui-msg').innerText = params.get('msg') || "";
        document.getElementById('cert-ui-footer').innerText = d.certFooter;
        document.getElementById('cert-ui-date').innerText = new Date().toLocaleDateString();
        document.getElementById('cert-modal').style.display = 'flex';
    }

    function closeCert() { document.getElementById('cert-modal').style.display = 'none'; }

    window.onload = () => {
        const params = new URLSearchParams(window.location.search);
        if(params.get('name')) {
            if (!sessionStorage.getItem('session_active')) {
                [1,2,3,4,5].forEach(id => localStorage.removeItem(`done_${id}`));
                sessionStorage.setItem('session_active', 'true');
            }
            changeLang(params.get('lang') || 'ko');
            document.getElementById('setup-section').style.display = 'none';
            document.getElementById('edu-section').style.display = 'block';
            renderList();
        }
    };
</script>
</body>
</html>
